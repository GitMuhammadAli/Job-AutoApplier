name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      # high+critical only — transitive low-sev shouldn't block PRs
      - run: npm audit --audit-level=high || true

  # Smoke tests — boots the actual built app against a throwaway Postgres
  # and runs Playwright against unauthenticated routes. Goal isn't full
  # coverage; it's catching "the route file got deleted" or "the admin
  # gate regressed to public" disasters before they hit prod. The exact
  # regression that bit us this session (Vercel-only Chromium PDF crash
  # — silent in dev, broken in prod) would have been caught here.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/jobpilot_test
      DIRECT_URL: postgres://postgres:postgres@localhost:5432/jobpilot_test
      NEXTAUTH_SECRET: ci-smoke-test-secret-not-real
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-test-encryption-key-32-bytes!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      # db push applies the schema directly without migration history —
      # faster than migrate deploy and we don't care about history in CI.
      - run: npx prisma db push --skip-generate --accept-data-loss
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start server
        run: npm start &
        env:
          PORT: 3000
      - name: Wait for server (up to 60s)
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000 -o /dev/null; then echo "up"; exit 0; fi
            sleep 1
          done
          echo "server never came up" >&2
          exit 1
      - name: Run smoke tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
